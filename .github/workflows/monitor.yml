name: Booking Monitor

on:
  # 排程已停用：GitHub 機房 IP 被 inline.app 防護 (PerimeterX/Cloudflare) 擋住，
  # 每次都 403。本機測試正常，待決定改用本機常駐或住宅代理後再啟用。
  # schedule:
  #   - cron: '*/10 * * * *'
  #   - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: booking-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send Heartbeat
        if: github.event.schedule == '0 1 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor_booking_api.py --heartbeat

      # 還原上次執行的狀態 (已通知過的開放日期清單)，避免每次都重發相同通知
      - name: Restore state
        if: github.event.schedule != '0 1 * * *'
        uses: actions/cache/restore@v4
        with:
          path: .booking_state.json
          key: booking-state-${{ github.run_id }}
          restore-keys: booking-state-

      - name: Run check (once)
        if: github.event.schedule != '0 1 * * *'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INLINE_COOKIE: ${{ secrets.INLINE_COOKIE }}
          USER_AGENT: ${{ secrets.USER_AGENT }}
          X_CLIENT_FINGERPRINT: ${{ secrets.X_CLIENT_FINGERPRINT }}
          X_CLIENT_SESSION_ID: ${{ secrets.X_CLIENT_SESSION_ID }}
          TARGET_DATES: ${{ vars.TARGET_DATES || '2026-08-15' }}
        run: python monitor_booking_api.py --once --state-file .booking_state.json

      - name: Save state
        if: always() && github.event.schedule != '0 1 * * *'
        uses: actions/cache/save@v4
        with:
          path: .booking_state.json
          key: booking-state-${{ github.run_id }}
